services:
  singae-local:
    build: .
    image: singae-local:latest
    container_name: singae-local
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
      - "${CHATBOT_LOCAL_SERVER_PORT:-13001}:13001"
    volumes:
      # Config + secrets (OPENAI_API_KEY, bridge secret, …)
      - ./private:/app/private
      # Named volumes avoid SQLite locking issues on Windows bind mounts
      - singae-chatbot-db:/app/chatbot/database
      - singae-user-admin-db:/app/tools/user-admin/database
      - singae-windowsshell-db:/app/tools/windowsshell/database
      - singae-assistant-db:/app/tools/singae-assistant/database
      - singae-it-support-data:/app/tools/it-support/data
    environment:
      NODE_ENV: production
      LISTEN_HOST: 0.0.0.0
      HUB_CHATBOT_PROXY: "1"
      CHATBOT_ENGINE_URL: http://127.0.0.1:13001
      # In-container URLs (processor/worker/engine on same host)
      CHATBOT_LOCAL_FORWARD_URL: http://127.0.0.1:13001/webhooks/chatbot/facebook
      CHATBOT_LOCAL_PROCESS_URL: http://127.0.0.1:13000/process

volumes:
  singae-chatbot-db:
  singae-user-admin-db:
  singae-windowsshell-db:
  singae-assistant-db:
  singae-it-support-data:
