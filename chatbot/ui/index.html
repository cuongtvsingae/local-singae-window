<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SINGAE - AI Chatbot</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-container">
      <main class="right-panel">
        <section class="conversation-list-section">
          <div class="section-header">
            <button id="btn-toggle-logs" class="icon-btn" title="Toggle menu">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
              </svg>
            </button>
            <button id="btn-new-conversation" class="icon-btn" title="New conversation">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
            </button>
          </div>
          <div class="conversation-list-toolbar">
            <input
              type="search"
              id="conversation-search"
              class="conversation-search-input"
              placeholder="Tìm tên hoặc tin nhắn..."
              autocomplete="off"
              aria-label="Tìm hội thoại"
            />
            <div class="inbox-status-select-wrap inbox-status-select-wrap--toolbar">
              <select id="conversation-care-filter" class="conversation-inbox-filter" title="Lọc theo trạng thái care" aria-label="Lọc trạng thái care">
                <option value="">Mọi trạng thái care</option>
                <option value="bot_care">Bot đang care</option>
                <option value="booked">Đã đặt lịch</option>
                <option value="treating">Đang điều trị</option>
                <option value="treatment_done">Điều trị xong</option>
              </select>
            </div>
          </div>
          <div id="conversation-list" class="conversation-list"></div>
          <div id="conversation-list-context-menu" class="conversation-context-menu hidden" role="menu" aria-hidden="true"></div>
        </section>

        <section class="conversation-detail-section">
          <div id="conversation-empty" class="conversation-empty">
            <div class="conversation-empty-icon" aria-hidden="true">
              <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
              </svg>
            </div>
            <div class="conversation-empty-message">Chọn một cuộc trò chuyện</div>
            <p class="conversation-empty-hint">Hội thoại Facebook Messenger hiển thị ở đây — chọn một cuộc để xem và trả lời.</p>
          </div>
          <div id="conversation-detail" class="conversation-detail hidden">
            <div class="detail-header">
              <div class="detail-header-left" id="detail-header-profile-zone" role="button" tabindex="0" aria-label="Xem thông tin hồ sơ chat">
                <div class="detail-title">
                  <h3 id="conversation-title">SINGAE</h3>
                  <span id="conversation-id" class="conversation-id"></span>
                </div>
              </div>
              <div class="detail-header-right">
                <div class="inbox-status-field" id="care-status-field" hidden>
                  <label class="inbox-status-label" for="conversation-care-status">Trạng thái care</label>
                  <div class="inbox-status-select-wrap">
                    <select id="conversation-care-status" class="conversation-inbox-status" title="Trạng thái care phiên chat" aria-label="Trạng thái care">
                      <option value="bot_care">Bot đang care</option>
                      <option value="booked">Đã đặt lịch</option>
                      <option value="treating">Đang điều trị</option>
                      <option value="treatment_done">Điều trị xong</option>
                    </select>
                  </div>
                </div>
                <button type="button" id="btn-customer-intake" class="icon-btn icon-btn-accent" title="Thông tin khách hàng đã thu thập" aria-label="Thông tin KH" hidden>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                  </svg>
                </button>
                <button type="button" id="btn-refresh-profile" class="icon-btn" title="Cập nhật profile Facebook (tên, ảnh)" aria-label="Update profile" hidden>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 2v6h-6"></path>
                    <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
                    <path d="M3 22v-6h6"></path>
                    <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
                  </svg>
                </button>
                <button type="button" id="btn-auto-reply" class="icon-btn icon-btn-accent" title="Bot trả lời một lần (theo tin khách gần nhất)" aria-label="Bot auto reply once" hidden>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M12 8V4H8"></path>
                    <rect x="4" y="8" width="16" height="12" rx="2"></rect>
                    <path d="M2 14h2"></path>
                    <path d="M20 14h2"></path>
                    <path d="M9 13v2"></path>
                    <path d="M15 13v2"></path>
                  </svg>
                </button>
                <div class="detail-actions">
                <button type="button" id="btn-clear-singae-messages" class="icon-btn" title="X�a to�n b? tin nh?n" hidden>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M3 6h18"></path>
                    <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path>
                    <path d="M10 11v6M14 11v6"></path>
                  </svg>
                </button>
                <button type="button" id="btn-delete-conversation" class="icon-btn" title="X�a cu?c tr� chuy?n" hidden>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                  </svg>
                </button>
                </div>
              </div>
            </div>
            <div id="chat-messages" class="chat-messages"></div>
            <form id="chat-form" class="chat-form">
              <div id="media-preview" class="chat-media-preview" hidden></div>
              <div class="input-group">
                <input
                  type="text"
                  id="message-input"
                  placeholder="Type your message..."
                  autocomplete="off"
                />
                <button type="button" id="btn-attach-media" class="icon-btn" title="Attach image/video">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21.44 11.05 12.25 20.24a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.19 9.19a2 2 0 1 1-2.83-2.83l8.49-8.49"/>
                  </svg>
                </button>
                <input id="chat-media-input" type="file" accept="image/*,video/*" hidden />
                <button type="submit" class="icon-btn send-btn" title="Send">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                  </svg>
                </button>
              </div>
            </form>
          </div>
        </section>
        <div id="new-conversation-backdrop" class="new-conversation-backdrop hidden"></div>
        <div id="new-conversation-panel" class="new-conversation-panel">
          <div class="new-conv-content">
            <div class="new-conv-avatar-wrapper">
              <div class="new-conv-avatar">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                  <circle cx="12" cy="13" r="4"></circle>
                </svg>
              </div>
            </div>
            <div class="new-conv-form">
              <label class="new-conv-label">Enter customer name</label>
              <input
                type="text"
                id="new-conv-name-inline"
                class="new-conv-input"
                placeholder=""
                autocomplete="off"
              />
            </div>
          </div>
          <div class="new-conv-actions">
            <button id="new-conv-cancel" class="new-conv-btn new-conv-btn-cancel">Cancel</button>
            <button id="new-conv-create" class="new-conv-btn new-conv-btn-next">Next</button>
          </div>
        </div>
      </main>
    </div>

    <div id="side-menu-backdrop" class="side-menu-backdrop hidden"></div>
    <div id="side-menu" class="side-menu">
      <div class="side-menu-item" id="menu-item-profile">
        <div class="side-menu-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
        <span>My Profile</span>
      </div>
      <div class="side-menu-item" id="menu-item-database">
        <div class="side-menu-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3c-4.97 0-9 1.57-9 3.5S7.03 10 12 10s9-1.57 9-3.5S16.97 3 12 3Zm-9 7v3.5C3 15.43 7.03 17 12 17s9-1.57 9-3.5V10c-1.74 1.48-5.29 2.5-9 2.5S4.74 11.48 3 10Zm0 7v.5C3 19.43 7.03 21 12 21s9-1.57 9-3.5V17c-1.74 1.48-5.29 2.5-9 2.5S4.74 18.48 3 17Z"/>
          </svg>
        </div>
        <span>Database</span>
      </div>
      <div class="side-menu-item" id="menu-item-contacts">
        <div class="side-menu-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
        </div>
        <span>Contacts</span>
      </div>
      <div class="side-menu-item" id="menu-item-change-model">
        <div class="side-menu-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
            <path d="M9 9h6v6H9z"></path>
            <path d="M9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 14h3M1 9h3M1 14h3"></path>
          </svg>
        </div>
        <span>�?i model</span>
      </div>
      <div class="side-menu-item" id="menu-item-prompts">
        <div class="side-menu-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
        </div>
        <span>Prompts</span>
      </div>
      <div class="side-menu-item" id="menu-item-logs">
        <div class="side-menu-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
        </div>
        <span>View Logs</span>
      </div>
    </div>

    <div id="modal-confirm-backdrop" class="modal-confirm-backdrop hidden"></div>
    <div id="modal-overlay" class="modal-overlay hidden">
      <div id="modal-container-root" class="modal-container">
        <div class="modal-header">
          <h3 id="modal-title"></h3>
          <button id="modal-close" class="icon-btn" title="Close">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div id="modal-body" class="modal-body"></div>
        <div id="modal-actions" class="modal-actions"></div>
      </div>
    </div>

    <!-- Separate overlay for telegram-copy-modal (avoid affecting other modals) -->
    <div id="copy-modal-overlay" class="copy-modal-overlay hidden">
      <div id="copy-modal-container" class="copy-modal-container"></div>
    </div>

    <!-- Separate overlay for telegram profile/info modal -->
    <div id="info-modal-overlay" class="info-modal-overlay hidden">
      <div id="info-modal-container" class="info-modal-container"></div>
    </div>

    <div id="logs-modal-overlay" class="logs-modal-overlay hidden">
      <div id="logs-modal-container" class="logs-modal-container">
        <div class="logs-modal-header">
          <h3>Server Logs</h3>
          <button id="logs-modal-close" class="icon-btn" title="Close">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div id="logs-modal-body" class="logs-modal-body">
          <div id="log-terminal" class="log-terminal"></div>
        </div>
      </div>
    </div>

    <!-- Customer intake: slide-in từ phải (Telegram-style), không dùng modal chung -->
    <div id="customer-intake-sheet" class="customer-intake-sheet" aria-hidden="true">
      <button type="button" id="customer-intake-sheet-backdrop" class="customer-intake-sheet-backdrop" tabindex="-1" aria-label="Đóng"></button>
      <aside id="customer-intake-sheet-panel" class="customer-intake-sheet-panel" role="dialog" aria-modal="true" aria-labelledby="customer-intake-sheet-title">
        <header class="customer-intake-sheet-header">
          <h2 id="customer-intake-sheet-title" class="customer-intake-sheet-title">Thông tin khách hàng đã thu thập</h2>
          <button type="button" id="customer-intake-sheet-close" class="customer-intake-sheet-close icon-btn" title="Đóng" aria-label="Đóng">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </header>
        <div id="customer-intake-sheet-body" class="customer-intake-sheet-body"></div>
        <footer class="customer-intake-sheet-footer">
          <button type="button" id="customer-intake-sheet-save" class="modal-btn modal-btn-primary">Lưu</button>
        </footer>
      </aside>
    </div>

    <script src="app.js"></script>
      <script src="/context-menu-fallback.js"></script>
  </body>
</html>
