    <script>
      (function () {
        var fallback = '#06080d url("asset/desktop-bg-black-ai.svg") center/cover no-repeat';
        var wallpaper = fallback;
        try {
          var raw = localStorage.getItem('desktop_shell_wallpaper_cache_v1');
          if (raw) {
            var parsed = JSON.parse(raw);
            if (parsed && typeof parsed.value === 'string' && parsed.value.trim()) {
              if (parsed.type === 'image') wallpaper = '#06080d url("' + parsed.value + '") center/cover no-repeat';
              if (parsed.type === 'gradient') wallpaper = parsed.value;
            }
          }
        } catch (_) {}
        document.documentElement.style.setProperty('--desktop-wallpaper-bg', wallpaper);
      })();
    </script>
