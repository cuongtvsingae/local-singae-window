    <path d="M1080 460 C1270 300, 1540 300, 1760 470" />
    <path d="M1060 580 C1270 390, 1560 420, 1780 610" />
    <path d="M1075 700 C1285 520, 1570 540, 1790 735" />
    <path d="M1125 815 C1315 670, 1570 700, 1755 840" />
    <path d="M1200 900 C1365 810, 1550 825, 1690 910" />
