<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bgGlowA" cx="72%" cy="38%" r="56%">
      <stop offset="0%" stop-color="#1f2937" stop-opacity="0.34"/>
      <stop offset="58%" stop-color="#0b0f16" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#030508" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="bgGlowB" cx="80%" cy="52%" r="38%">
      <stop offset="0%" stop-color="#e5e7eb" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e5e7eb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d1d5db" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#f3f4f6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#9ca3af" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
