    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#020305"/>
  <rect width="1920" height="1080" fill="url(#bgGlowA)"/>
  <rect width="1920" height="1080" fill="url(#bgGlowB)"/>

  <!-- Abstract AI head silhouette -->
