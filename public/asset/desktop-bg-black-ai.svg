    <text x="1020" y="360">1011 0010 1110 0101 0001 1101 0110 1001</text>
    <text x="980" y="430">0011 0111 1010 0010 1101 0110 0100 1110</text>
    <text x="960" y="510">1100 1011 0101 0110 0011 1001 1110 0101</text>
    <text x="980" y="590">0110 1101 0010 1011 0101 1110 0011 0100</text>
    <text x="1030" y="670">1010 0101 1100 0111 0010 1110 0101 1001</text>
    <text x="1100" y="750">0011 1010 0110 1101 0101 0010 1110 0101</text>
    <text x="1190" y="830">1101 0101 0011 0110 1010 0101 1110 0011</text>
