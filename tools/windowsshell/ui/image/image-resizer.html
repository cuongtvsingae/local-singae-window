<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <title>Image Resizer | singae.cloud</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Online utility tool on singae.cloud." />
    <link rel="canonical" href="https://singae.cloud/tools/image/image-resizer.html" />
    <link rel="icon" type="image/png" href="../../asset/logo.png" />
    <link rel="stylesheet" href="../../style.css" />
    <style>
      .tool-shell {
        max-width: 1000px;
        margin: 0 auto;
        padding: 32px 24px 40px;
      }
      .tool-header-row {
        margin-bottom: 20px;
        text-align: center;
      }
      .tool-title-main {
        font-size: 32px;
        font-weight: 700;
        letter-spacing: -0.03em;
        margin: 0 0 6px;
        text-align: center;
      }
      .tool-sub {
        margin: 0;
        font-size: 14px;
        color: var(--text-muted);
        text-align: center;
      }
      .upload-area {
        border: 2px dashed var(--border-soft);
        border-radius: 8px;
        padding: 40px;
        text-align: center;
        cursor: pointer;
        transition: all 150ms ease-out;
        background: rgba(15, 23, 42, 0.3);
        max-width: 600px;
        margin: 0 auto;
      }
      .upload-area:hover {
        border-color: var(--accent-strong);
        background: rgba(15, 23, 42, 0.5);
      }
      .upload-area.dragover {
        border-color: var(--accent-strong);
        background: rgba(59, 130, 246, 0.1);
      }
      .upload-icon {
        font-size: 48px;
        margin-bottom: 12px;
      }
      .upload-text {
        font-size: 14px;
        color: var(--text);
        margin-bottom: 4px;
      }
      .upload-hint {
        font-size: 12px;
        color: var(--text-muted);
      }
      input[type="file"] {
        display: none;
      }
      .preview-grid {
        display: flex;
        justify-content: center;
        margin-top: 24px;
      }
      .preview-box {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
        max-width: 800px;
        width: 100%;
      }
      .preview-label {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
        text-align: center;
      }
      .preview-image {
        width: 100%;
        max-height: 400px;
        object-fit: contain;
        border-radius: 8px;
        border: 1px solid var(--border-soft);
        background: #020617;
      }
      .preview-box .crop-preview-wrapper {
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 8px;
        border: 1px solid var(--border-soft);
        background: #020617;
        overflow: hidden;
      }
      .file-info {
        font-size: 12px;
        color: var(--text-muted);
        font-family: ui-monospace, monospace;
        text-align: center;
      }
      .size-controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 20px;
        max-width: 300px;
        margin-left: auto;
        margin-right: auto;
      }
      .size-control {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .size-control label {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
        line-height: 1.2;
      }
      .size-control input {
        width: 100%;
        padding: 4px 8px;
        border-radius: 6px;
        border: 1px solid var(--border-soft);
        background: #020617;
        color: var(--text);
        font-family: ui-monospace, monospace;
        font-size: 13px;
        outline: none;
        height: auto;
        line-height: 1.4;
      }
      .size-control input:focus {
        border-color: var(--accent-strong);
      }
      .preset-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 12px;
        justify-content: center;
        align-items: center;
      }
      .preset-btn {
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid var(--border-soft);
        background: var(--card);
        cursor: pointer;
        transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);
        font-size: 11px;
        text-align: center;
        position: relative;
        overflow: visible;
        white-space: nowrap;
      }
      .preset-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: var(--accent-strong);
        opacity: 0;
        transition: opacity 200ms cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 0;
      }
      .preset-btn > * {
        position: relative;
        z-index: 1;
      }
      .preset-btn:hover {
        border-color: var(--accent-strong);
        background: var(--accent-soft);
      }
      .preset-btn.selected {
        border-color: var(--accent-strong);
        background: var(--accent-strong);
        color: #fff;
        transform: scale(1.02);
        box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
      }
      .preset-btn.selected::before {
        opacity: 1;
      }
      .btn-row {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-top: 20px;
      }
      .btn {
        padding: 10px 20px;
        border-radius: 6px;
        border: 1px solid var(--border-soft);
        background: var(--card);
        color: var(--text);
        font-size: 13px;
        cursor: pointer;
        transition: all 150ms ease-out;
      }
      .btn:hover {
        background: var(--accent-soft);
        border-color: var(--accent-strong);
        transform: translateY(-1px);
      }
      .btn-primary {
        background: var(--accent-strong);
        border-color: var(--accent-strong);
        color: #ffffff;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .code-samples-section {
        margin-top: 32px;
        padding-top: 24px;
        border-top: 1px solid var(--border-soft);
      }
      .code-samples-title {
        font-size: 18px;
        font-weight: 600;
        margin: 0 0 16px;
        color: var(--text);
      }
      .code-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
        border-bottom: 1px solid var(--border-soft);
        position: relative;
        z-index: 0;
      }
      .code-tab {
        padding: 8px 16px;
        border: none;
        background: transparent;
        color: var(--text-muted);
        font-size: 13px;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
        transition: all 150ms ease-out;
        position: relative;
        z-index: 2;
        user-select: none;
        -webkit-user-select: none;
      }
      .code-tab:hover {
        color: var(--text);
      }
      .code-tab.active {
        color: var(--accent-strong);
        border-bottom-color: var(--accent-strong);
      }
      .code-blocks {
        position: relative;
      }
      .code-block {
        display: none;
      }
      .code-block.active {
        display: block;
      }
      .code-block pre {
        margin: 0;
        padding: 16px;
        border-radius: 6px;
        border: 1px solid var(--border-soft);
        background: #020617;
        overflow-x: auto;
      }
      .code-block code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
        line-height: 1.6;
        color: var(--text);
        white-space: pre;
      }
      .option-controls {
        margin-top: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .checkbox-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--text);
        cursor: pointer;
      }
      .checkbox-label input[type="checkbox"] {
        width: 16px;
        height: 16px;
        cursor: pointer;
      }
      .rotate-controls {
        margin-top: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: center;
      }
      .rotate-controls label {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
        text-align: center;
      }
      .rotate-buttons {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .btn-small {
        padding: 6px 12px;
        font-size: 12px;
      }
      .icon-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 8px;
        min-width: 36px;
      }
      .icon-btn svg {
        width: 18px;
        height: 18px;
      }
      #cropCanvas {
        display: block;
        max-width: 100%;
        cursor: move;
        border-radius: 8px;
        border: 1px solid var(--border-soft);
        background: #020617;
        margin: 0 auto;
      }
      .crop-controls {
        margin-top: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
      }
      .crop-controls label {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
        text-align: center;
      }
      .crop-info {
        text-align: center;
      }
      .crop-preview-wrapper {
        position: relative;
        border: 1px solid var(--border-soft);
        border-radius: 8px;
        background: #020617;
        overflow: hidden;
      }
      #previewCanvas {
        display: block;
        max-width: 100%;
        border-radius: 8px;
        border: 1px solid var(--border-soft);
        background: #020617;
      }
      .crop-info {
        font-size: 12px;
        color: var(--text-muted);
        font-family: ui-monospace, monospace;
      }
    </style>
  
      <link rel="stylesheet" href="/tools/theme-singae.css" />
  <body data-tool-theme="singae">
<div id="tool-meta-hidden" style="display:none" aria-hidden="true">
      <span id="tagline"></span>
      <span id="title"></span>
      <span id="subtitle"></span>
    </div>
    <main class="tool-shell">
      <div class="upload-area" id="uploadArea">
        <div class="upload-icon">IMG</div>
        <div class="upload-text" id="uploadText"></div>
        <div class="upload-hint" id="uploadHint"></div>
        <input type="file" id="fileInput" accept="image/*" />
      </div>

      <div id="resizeControls" style="display: none;">
        <div class="preset-buttons" id="presetButtons"></div>
        <div class="size-controls">
          <div class="size-control">
            <label id="widthLabel"></label>
            <input type="number" id="widthInput" min="1" />
          </div>
          <div class="size-control">
            <label id="heightLabel"></label>
            <input type="number" id="heightInput" min="1" />
          </div>
        </div>
        <div class="option-controls" style="display: none;">
          <label class="checkbox-label">
            <input type="checkbox" id="maintainAspect" checked disabled />
            <span id="maintainAspectLabel"></span>
          </label>
        </div>
        <div class="rotate-controls">
          <div class="rotate-buttons">
            <button class="btn btn-small icon-btn" id="btnRotate" data-tooltip="Rotate 90 deg" data-tooltip-pos="top">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
              </svg>
            </button>
            <button class="btn btn-small icon-btn" id="btnResetRotate" data-tooltip="Rotate 90 deg" data-tooltip-pos="top">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
                <path d="M21 3v5h-5"/>
                <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
                <path d="M8 16H3v5"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="crop-controls" id="cropControls" style="display: none;">
        </div>
      </div>

      <div class="preview-grid" id="previewGrid" style="display: none;">
        <div class="preview-box">
          <canvas id="cropCanvas"></canvas>
          <div class="file-info" id="originalInfo"></div>
        </div>
      </div>

      <div class="btn-row" id="btnRow" style="display: none;">
        <button class="btn btn-primary" id="btnResize"></button>
        <button class="btn" id="btnDownload"></button>
      </div>

      <div class="code-samples-section" id="codeSamplesSection" style="display: none;">
        <h3 class="code-samples-title" id="codeSamplesTitle"></h3>
        <div class="code-tabs">
          <button class="code-tab active" data-tab="javascript">JavaScript</button>
          <button class="code-tab" data-tab="python">Python</button>
          <button class="code-tab" data-tab="react">React</button>
          <button class="code-tab" data-tab="vue">Vue</button>
          <button class="code-tab" data-tab="swift">Swift</button>
          <button class="code-tab" data-tab="android">Android</button>
        </div>
        <div class="code-blocks">
          <div class="code-block active" id="javascriptCode">
            <pre><code>// JavaScript code will appear here</code></pre>
          </div>
          <div class="code-block" id="pythonCode">
            <pre><code>// Python code will appear here</code></pre>
          </div>
          <div class="code-block" id="reactCode">
            <pre><code>// React code will appear here</code></pre>
          </div>
          <div class="code-block" id="vueCode">
            <pre><code>// Vue code will appear here</code></pre>
          </div>
          <div class="code-block" id="swiftCode">
            <pre><code>// Swift code will appear here</code></pre>
          </div>
          <div class="code-block" id="androidCode">
            <pre><code>// Android code will appear here</code></pre>
          </div>
        </div>
      </div>
    </main>

    <script src="../../tooltip.js"></script>
<script src="image-resizer.js"></script>
      <script src="/context-menu-fallback.js"></script>
  </body>
</html>
