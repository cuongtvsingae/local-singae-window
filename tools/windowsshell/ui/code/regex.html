<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <title>Regex | singae.cloud</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Online utility tool on singae.cloud." />
    <link rel="canonical" href="https://singae.cloud/tools/code/regex.html" />
    <link rel="icon" type="image/png" href="../../asset/logo.png" />
    <link rel="stylesheet" href="../../style.css" />
    <style>
      .tool-shell {
        max-width: 1000px;
        margin: 0 auto;
        padding: 32px 24px 40px;
      }
      .tool-header-row {
        margin-bottom: 20px;
        text-align: center;
      }
      .tool-title-main {
        font-size: 32px;
        font-weight: 700;
        letter-spacing: -0.03em;
        margin: 0 0 6px;
        text-align: center;
      }
      .tool-sub {
        margin: 0;
        font-size: 14px;
        color: var(--text-muted);
        text-align: center;
      }
      .regex-layout {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .panel {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .panel-label {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
      }
      .regex-input-group {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px;
        border-radius: 6px;
        border: 1px solid var(--border-soft);
        background: #020617;
      }
      .regex-input-group input {
        flex: 1;
        border: none;
        background: transparent;
        color: var(--text);
        font-family: ui-monospace, monospace;
        font-size: 13px;
        outline: none;
      }
      .regex-input-group label {
        font-size: 11px;
        color: var(--text-muted);
        white-space: nowrap;
      }
      .regex-flags {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .flag-checkbox {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .flag-checkbox input {
        cursor: pointer;
      }
      .flag-checkbox label {
        font-size: 12px;
        color: var(--text);
        cursor: pointer;
      }
      textarea {
        width: 100%;
        min-height: 200px;
        padding: 12px;
        border-radius: 6px;
        border: 1px solid var(--border-soft);
        background: #020617;
        color: var(--text);
        font-family: ui-monospace, monospace;
        font-size: 13px;
        line-height: 1.5;
        resize: vertical;
        outline: none;
      }
      textarea:focus {
        border-color: var(--accent-strong);
      }
      .regex-results {
        padding: 16px;
        border-radius: 6px;
        border: 1px solid var(--border-soft);
        background: rgba(15, 23, 42, 0.96);
        min-height: 100px;
        font-family: ui-monospace, monospace;
        font-size: 13px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .regex-match {
        background: rgba(34, 197, 94, 0.2);
        color: #4ade80;
        padding: 2px 4px;
        border-radius: 2px;
      }
      .regex-error {
        color: #fca5a5;
        background: rgba(248, 113, 113, 0.1);
        padding: 12px;
        border-radius: 4px;
      }
      .regex-info {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 8px;
      }
    </style>
  
      <link rel="stylesheet" href="/tools/theme-singae.css" />
  <body data-tool-theme="singae">
<div id="tool-meta-hidden" style="display:none" aria-hidden="true">
      <span id="tagline"></span>
      <span id="title"></span>
      <span id="subtitle"></span>
    </div>
    <main class="tool-shell">
      <div class="regex-layout">
        <div class="panel">
          <label class="panel-label" id="patternLabel"></label>
          <div class="regex-input-group">
            <label>/</label>
            <input type="text" id="pattern" placeholder="" />
            <label>/</label>
          </div>
          <div class="regex-flags">
            <div class="flag-checkbox">
              <input type="checkbox" id="flagG" />
              <label for="flagG">g (global)</label>
            </div>
            <div class="flag-checkbox">
              <input type="checkbox" id="flagI" />
              <label for="flagI">i (ignore case)</label>
            </div>
            <div class="flag-checkbox">
              <input type="checkbox" id="flagM" />
              <label for="flagM">m (multiline)</label>
            </div>
          </div>
        </div>
        <div class="panel">
          <label class="panel-label" id="testLabel"></label>
          <textarea id="testText" placeholder="" spellcheck="false"></textarea>
        </div>
        <div class="panel">
          <label class="panel-label" id="resultsLabel"></label>
          <div id="regexResults" class="regex-results"></div>
          <div id="regexInfo" class="regex-info"></div>
        </div>
      </div>
    </main>

    <script src="../../tooltip.js"></script>
<script src="regex.js"></script>
      <script src="/context-menu-fallback.js"></script>
  </body>
</html>
